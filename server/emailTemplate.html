<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmación de Cita</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            color: #333333;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        .container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            background-color: #ffffff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        h1 {
            color: #FF69B4; /* Pink */
        }
        strong {
            color: #FF69B4; /* Pink */
        }
        .footer {
            margin-top: 20px;
            font-size: 0.9em;
            color: #777777;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Makeupflow Confirmación de Cita</h1>
        <p>Hola {{name}},</p>
        <p>Tu cita para <strong>{{service}}</strong> ha sido confirmada para el siguiente horario:</p>
        <p><strong>Fecha:</strong> {{date}}</p>
        <p><strong>Hora:</strong> {{time}}</p>
        <p>¡Te esperamos!</p>
        <p>Si tienes alguna pregunta, no dudes en contactarnos.</p>
        <p class="footer">Gracias por elegir Makeupflow.</p>
    </div>
</body>
</html>
